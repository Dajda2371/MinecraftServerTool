<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Minecraft Server Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at top right, #1e1e2e, #0a0a0f);
            overflow: hidden;
        }
        .login-card {
            background: rgba(22, 22, 31, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: card-appear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes card-appear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            margin-bottom: 16px;
            display: inline-block;
        }
        .login-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .login-header p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
                    <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#logo-grad)" />
                    <rect x="8" y="8" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.9)" />
                    <rect x="18" y="8" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.7)" />
                    <rect x="8" y="18" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.7)" />
                    <rect x="18" y="18" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.5)" />
                    <defs>
                        <linearGradient id="logo-grad" x1="2" y1="2" x2="30" y2="30">
                            <stop stop-color="#6366f1"/>
                            <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to manage your servers</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" required placeholder="admin" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" id="btn-submit-login" style="width: 100%; padding: 12px; margin-top: 8px; justify-content: center;">
                Log In
            </button>
        </form>
    </div>

    <div id="toast-container"></div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const btn = document.getElementById('btn-submit-login');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const json = await resp.json();
                if (!resp.ok) {
                    throw new Error(json.error || `HTTP ${resp.status}`);
                }
                
                window.location.href = '/';
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Log In';
            }
        }

        document.getElementById('login-form').addEventListener('submit', handleLogin);

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast--${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 4000);
        }
    </script>
</body>
</html>
