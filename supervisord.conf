; ============================================================================
; Supervisor configuration for the Management Container
; ============================================================================
; Manages the Python web server + API for managing Minecraft servers.
; Infrared runs in a separate container (see docker-compose.yml).
; ============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

; ---- MinecraftServerTool Web Server ----
[program:webserver]
command=python webserver.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10
