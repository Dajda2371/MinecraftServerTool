# ============================================================================
# Docker Compose — Minecraft Server Infrastructure
# ============================================================================
#
# Architecture:
#   - mc-tool (Management Container):
#       • Runs the MinecraftServerTool (Python web server + CLI)
#       • Generates Infrared proxy config from the database
#       • Spawns child containers via Docker socket
#
#   - infrared (Proxy Container):
#       • Runs Infrared (github.com/haveachin/infrared) for hostname-based
#         routing on port 25565
#       • Config is generated by mc-tool and shared via volume
#       • Hot-reloads config file changes — no restart required
#
#   - Child containers (NOT defined here — spawned dynamically by mc-tool):
#       • One per Minecraft server
#       • Connected to mc-net only
#       • No published ports
#
# Network:
#   - mc-net: Internal Docker network connecting all containers
#   - Only port 25565 is exposed to the host (Infrared proxy)
#
# DNS:
#   - Each subdomain (e.g., survival.mc.example.com) must point to host IP
#   - Players connect to hostname:25565, Infrared routes to correct backend
#
# ============================================================================

services:
  mc-tool:
    build: .
    container_name: minecraft-server-tool
    ports:
      # Web management interface (admin only, optional)
      - "8000:8000"
    volumes:
      # Docker socket — allows mc-tool to create/control child containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data (database, server files, Infrared config)
      - ./data:/app/data
    environment:
      # Host-side path for Docker-out-of-Docker volume mounts
      - MC_HOST_DATA_DIR=${PWD}/data
    networks:
      - mc-net
    restart: unless-stopped

  infrared:
    image: haveachin/infrared:latest
    container_name: mc-infrared
    ports:
      # Infrared proxy — the ONLY port players connect to
      - "25565:25565"
    volumes:
      # Infrared config (generated by mc-tool: config.yml + proxies/*.yml)
      - ./data/infrared:/etc/infrared
    networks:
      - mc-net
    depends_on:
      - mc-tool
    restart: unless-stopped

networks:
  mc-net:
    name: mc-net
    driver: bridge
