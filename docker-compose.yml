# ============================================================================
# Docker Compose — Minecraft Server Infrastructure
# ============================================================================
#
# Architecture:
#   - mc-tool (Management Container):
#       • Runs the MinecraftServerTool (Python web server + CLI)
#       • Generates Infrared proxy config from the database
#       • Spawns child containers via Docker socket
#
#   - postgres (Database Container):
#       • Runs PostgreSQL 16 with the mcserver database
#       • Stores servers, users, and sessions
#       • Separate named volume (mc-postgres-data) for durability
#       • Only reachable on the internal mc-net network; no host port
#
#   - infrared (Proxy Container):
#       • Runs Infrared (github.com/haveachin/infrared) for hostname-based
#         routing on port 25565
#       • Config is generated by mc-tool and shared via volume
#       • Hot-reloads config file changes — no restart required
#
#   - mc-server-base (build-only):
#       • Builds the base image used for every child server container.
#       • Never runs as a long-lived service — `docker compose build`
#         produces mc-server-base:latest which mc-tool then references
#         when spawning servers.
#
#   - Child containers (NOT defined here — spawned dynamically by mc-tool):
#       • One per Minecraft server
#       • Connected to mc-net only
#       • No published ports
#
# Storage:
#   - mc-data: Docker named volume holding the per-server directories and
#     Infrared config. Replaces the old ./data bind mount so POSIX
#     permissions work consistently across Linux, macOS (VirtioFS), and
#     Windows (WSL2) Docker Desktop.
#   - mc-postgres-data: Docker named volume holding the PostgreSQL cluster.
#     Back both up periodically:
#       docker run --rm -v mc-data:/data -v "$PWD/backups:/backup" alpine \
#         tar czf /backup/mc-data-$(date +%F).tar.gz -C /data .
#       docker compose exec postgres pg_dump -U mcserver mcserver \
#         > backups/mcserver-$(date +%F).sql
#
# Network:
#   - mc-net: Internal Docker network connecting all containers
#   - Only port 25565 is exposed to the host (Infrared proxy)
#
# DNS:
#   - Each subdomain (e.g., survival.mc.example.com) must point to host IP
#   - Players connect to hostname:25565, Infrared routes to correct backend
#
# Credentials:
#   - POSTGRES_PASSWORD defaults to "mcserver" for dev. Override it in
#     production via an .env file next to this compose file, e.g.:
#       POSTGRES_PASSWORD=your-strong-password
# ============================================================================

services:
  mc-tool:
    build: .
    container_name: minecraft-server-tool
    ports:
      # Web management interface (admin only, optional)
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mcserver
      POSTGRES_USER: mcserver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcserver}
    volumes:
      # Docker socket — allows mc-tool to create/control child containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent app data — replaces the old ./data bind mount
      - mc-data:/app/data
    networks:
      - mc-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: mc-postgres
    environment:
      POSTGRES_DB: mcserver
      POSTGRES_USER: mcserver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcserver}
    volumes:
      - mc-postgres-data:/var/lib/postgresql/data
    networks:
      - mc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcserver -d mcserver"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  infrared:
    image: haveachin/infrared:latest
    container_name: mc-infrared
    ports:
      # Infrared proxy — the ONLY port players connect to
      - "25565:25565"
    volumes:
      # Read the infrared/ subpath of the shared volume so mc-tool's
      # generated config.yml + proxies/*.yml show up at /etc/infrared.
      - type: volume
        source: mc-data
        target: /etc/infrared
        volume:
          subpath: infrared
    networks:
      - mc-net
    depends_on:
      - mc-tool
    restart: unless-stopped

  # Build-only: produces the base image for child server containers.
  # Activated with `docker compose --profile build-only build` or simply
  # `docker compose build` (which picks up all profiles).
  mc-server-base:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: mc-server-base:latest
    command: ["true"]
    profiles: ["build-only"]

volumes:
  mc-data:
  mc-postgres-data:

networks:
  mc-net:
    name: mc-net
    driver: bridge
